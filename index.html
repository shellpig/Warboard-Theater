<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>戰局劇場 Warboard Theater</title>
  <link rel="stylesheet" href="engine/style.css" />
</head>
<body class="menu">
  <header id="site-header">
    <div>
      <h1 id="brand"></h1>
      <p id="tagline"></p>
    </div>
    <div id="lang-slot"></div>
  </header>
  <main id="grid"></main>
  <p id="status-msg"></p>

  <script type="module">
    import { initI18n, getLang, t, pick, createLangSwitcher } from "./engine/i18n.js";

    initI18n();
    document.title = `${t("brand")} Warboard Theater`;
    document.getElementById("brand").textContent = t("brand");
    document.getElementById("tagline").textContent = t("tagline");
    document.getElementById("lang-slot").appendChild(createLangSwitcher());

    const grid = document.getElementById("grid");
    const statusMsg = document.getElementById("status-msg");

    try {
      const res = await fetch("battles/manifest.json");
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const manifest = await res.json();

      // ready 戰役另載 battle.json 充實卡片(肖像對峙、摘要);失敗則退化為基本卡
      const details = await Promise.all(
        manifest.battles.map(async (b) => {
          if (b.status !== "ready") return null;
          try {
            const r = await fetch(`battles/${b.id}/battle.json`);
            return r.ok ? await r.json() : null;
          } catch {
            return null;
          }
        })
      );

      manifest.battles.forEach((b, bi) => {
        const ready = b.status === "ready";
        const detail = details[bi];
        const card = document.createElement(ready ? "a" : "div");
        card.className = `card ${ready ? "ready" : "coming"}`;
        if (ready) card.href = `theater.html?battle=${b.id}&lang=${getLang()}`;

        if (b.poster) {
          const img = document.createElement("img");
          img.className = "poster";
          img.alt = "";
          img.src = b.poster;
          img.addEventListener("error", () => img.remove());
          card.appendChild(img);
        }

        const shade = document.createElement("div");
        shade.className = "shade";
        card.appendChild(shade);

        // 兩側(按 side)主帥肖像對峙 + 中央 VS;單側多陣營取各陣營首位主帥並列
        if (detail?.factions?.length) {
          const sides = [];
          for (const f of detail.factions) {
            let s = sides.find((x) => x.side === f.side);
            if (!s) sides.push((s = { side: f.side, color: f.color, ports: [] }));
            const c = (f.commanders || [])[0];
            if (c?.portrait) s.ports.push(`battles/${b.id}/${c.portrait}`);
          }
          if (sides.length === 2) {
            card.style.setProperty("--glow-n", sides[0].color);
            card.style.setProperty("--glow-s", sides[1].color);
            const versus = document.createElement("div");
            versus.className = "versus";
            const vs = document.createElement("span");
            vs.className = "vs";
            vs.textContent = "VS";
            const groups = sides.map((s) => {
              const g = document.createElement("div");
              g.className = "side";
              for (const src of s.ports) {
                const img = document.createElement("img");
                img.alt = "";
                img.src = src;
                // 缺圖即移除;任一側全缺則 VS 一併隱藏
                img.addEventListener("error", () => {
                  img.remove();
                  if (groups.some((x) => !x.childElementCount)) vs.style.display = "none";
                });
                g.appendChild(img);
              }
              return g;
            });
            if (groups.every((g) => g.childElementCount)) {
              versus.append(groups[0], vs, groups[1]);
              card.appendChild(versus);
            }
          }
        }

        const header = document.createElement("div");
        header.className = "card-header";
        const chDate = document.createElement("div");
        chDate.className = "ch-date";
        chDate.textContent = detail ? pick(detail.date_display) : b.year;
        const chTitle = document.createElement("div");
        chTitle.className = "ch-title";
        chTitle.textContent = pick(b.title);
        const chSub = document.createElement("div");
        chSub.className = "ch-subtitle";
        chSub.textContent = detail ? pick(detail.subtitle) : "";
        header.append(chDate, chTitle, chSub);
        card.appendChild(header);

        if (!ready) {
          const badge = document.createElement("div");
          badge.className = "badge-soon";
          badge.textContent = t("coming_soon");
          card.appendChild(badge);
        }

        grid.appendChild(card);
      });
    } catch (err) {
      console.error(err);
      statusMsg.textContent = t("load_error");
    }
  </script>
</body>
</html>
