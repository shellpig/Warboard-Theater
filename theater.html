<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Warboard Theater</title>
  <link rel="stylesheet" href="engine/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body class="theater">
  <div id="stage"></div>
  <div id="overlay">
    <div id="cine">
      <div id="vignette"></div>
      <div id="grain"></div>
      <div class="cine-bar top"></div>
      <div class="cine-bar bottom"></div>
    </div>
    <div id="labels"></div>
    <header id="topbar">
      <a id="back-link" class="btn"></a>
      <div id="battle-title">
        <h1></h1>
        <p></p>
      </div>
      <div id="lang-slot"></div>
    </header>
    <div id="war-meter"></div>
    <div id="time-panel"></div>
    <div id="status-msg"></div>
    <div id="event-card"></div>
    <footer id="hud"></footer>
    <div id="title-screen"></div>
    <div id="end-screen"></div>
    <div id="toast"></div>
  </div>
  <script type="module" src="engine/main.js"></script>
</body>
</html>
